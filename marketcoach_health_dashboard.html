<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketCoach — Live Health Dashboard</title>
<style>
  :root {
    --bg: #0D131A;
    --card: #111925;
    --card2: #16202C;
    --border: #1E2D3D;
    --teal: #12A28C;
    --teal-dim: rgba(18,162,140,0.15);
    --teal-glow: rgba(18,162,140,0.3);
    --green: #27AE60;
    --green-dim: rgba(39,174,96,0.15);
    --red: #E74C3C;
    --red-dim: rgba(231,76,60,0.15);
    --yellow: #F39C12;
    --yellow-dim: rgba(243,156,18,0.15);
    --blue: #3498DB;
    --blue-dim: rgba(52,152,219,0.15);
    --text: #E8EDF2;
    --text-dim: #7A8B9A;
    --text-muted: #4A5A6A;
    --mono: 'Fira Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 0.5px;
  }
  .topbar-logo span { color: var(--text); }
  .topbar-url {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 380px;
  }
  .topbar-url label { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
  .topbar-url input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    flex: 1;
    outline: none;
    font-family: var(--mono);
  }
  .topbar-url input:focus { border-color: var(--teal); }
  .topbar-symbol {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-symbol label { color: var(--text-dim); font-size: 12px; }
  .topbar-symbol input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    width: 80px;
    outline: none;
    text-transform: uppercase;
  }
  .topbar-symbol input:focus { border-color: var(--teal); }
  .topbar-actions { display: flex; gap: 8px; margin-left: auto; }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--teal);
    color: #fff;
  }
  .btn-primary:hover { background: #0e8a78; }
  .btn-primary:disabled { background: #1a3a35; color: var(--text-muted); cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--card2); color: var(--text); }

  /* SUMMARY STRIP */
  .summary-strip {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-cell {
    flex: 1;
    background: var(--card);
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .summary-cell .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-cell .value { font-size: 22px; font-weight: 700; }
  .summary-cell .value.green { color: var(--green); }
  .summary-cell .value.red { color: var(--red); }
  .summary-cell .value.yellow { color: var(--yellow); }
  .summary-cell .value.teal { color: var(--teal); }
  .summary-cell .sub { font-size: 11px; color: var(--text-dim); }

  /* PROGRESS BAR */
  .progress-bar-wrap { padding: 8px 24px; background: var(--card); border-bottom: 1px solid var(--border); }
  .progress-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--green)); border-radius: 2px; transition: width 0.3s; }

  /* MAIN LAYOUT */
  .main { display: flex; gap: 0; }
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--card);
    border-right: 1px solid var(--border);
    min-height: calc(100vh - 120px);
    position: sticky;
    top: 57px;
    height: calc(100vh - 57px);
    overflow-y: auto;
  }
  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; padding: 0 4px; }
  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    transition: all 0.12s;
    gap: 6px;
  }
  .sidebar-item:hover { background: var(--card2); color: var(--text); }
  .sidebar-item.active { background: var(--teal-dim); color: var(--teal); }
  .sidebar-item .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted); flex-shrink: 0;
  }
  .sidebar-item .dot.green { background: var(--green); }
  .sidebar-item .dot.red { background: var(--red); }
  .sidebar-item .dot.yellow { background: var(--yellow); }
  .sidebar-item .dot.running { background: var(--teal); animation: pulse 1s infinite; }
  .sidebar-badge {
    font-size: 10px; background: var(--bg); color: var(--text-muted);
    border-radius: 10px; padding: 1px 6px; font-family: var(--mono);
  }

  /* CONTENT */
  .content { flex: 1; padding: 20px 24px; overflow-x: hidden; }
  .category-section { margin-bottom: 28px; scroll-margin-top: 70px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .category-icon { font-size: 16px; }
  .category-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .category-count { font-size: 12px; color: var(--text-muted); background: var(--card2); padding: 2px 8px; border-radius: 10px; }
  .category-run-btn {
    margin-left: auto;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .category-run-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

  /* TEST CARDS */
  .tests-grid { display: flex; flex-direction: column; gap: 6px; }
  .test-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .test-card:hover { border-color: #2A3D50; }
  .test-card.pass { border-left: 3px solid var(--green); }
  .test-card.fail { border-left: 3px solid var(--red); }
  .test-card.mock { border-left: 3px solid var(--yellow); }
  .test-card.running { border-left: 3px solid var(--teal); }
  .test-card.pending { border-left: 3px solid var(--text-muted); }

  .test-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .test-status-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .test-method {
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
    font-family: var(--mono); flex-shrink: 0;
  }
  .test-method.GET { background: var(--blue-dim); color: var(--blue); }
  .test-method.POST { background: var(--green-dim); color: var(--green); }
  .test-method.WS { background: var(--yellow-dim); color: var(--yellow); }
  .test-method.DELETE { background: var(--red-dim); color: var(--red); }
  .test-path {
    font-family: var(--mono); font-size: 12px; color: var(--text); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .test-name { font-size: 12px; color: var(--text-dim); flex-shrink: 0; max-width: 180px; }
  .test-time { font-size: 11px; color: var(--text-muted); font-family: var(--mono); flex-shrink: 0; min-width: 48px; text-align: right; }
  .test-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
    font-weight: 600;
  }
  .test-badge.pass { background: var(--green-dim); color: var(--green); }
  .test-badge.fail { background: var(--red-dim); color: var(--red); }
  .test-badge.mock { background: var(--yellow-dim); color: var(--yellow); }
  .test-badge.pending { background: #1A2535; color: var(--text-muted); }
  .test-badge.running { background: var(--teal-dim); color: var(--teal); animation: pulse 1s infinite; }
  .test-run-btn {
    width: 24px; height: 24px; flex-shrink: 0;
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .test-run-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

  /* EXPANDED RESPONSE */
  .test-detail {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .test-detail.open { display: block; }
  .detail-tabs { display: flex; gap: 0; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
  .detail-tab {
    padding: 6px 12px; font-size: 12px; color: var(--text-muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s;
  }
  .detail-tab:hover { color: var(--text); }
  .detail-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .detail-pane { display: none; }
  .detail-pane.active { display: block; }
  .response-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: #8FBCDE;
    max-height: 280px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
  }
  .response-block .key { color: #9BC4E8; }
  .response-block .str { color: #A8D8A8; }
  .response-block .num { color: #FFD18C; }
  .response-block .bool { color: #FF8C8C; }
  .response-block .null { color: #888; }
  .error-block {
    background: var(--red-dim);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: #FF8C8C;
    white-space: pre-wrap;
  }
  .verify-block {
    display: flex; flex-direction: column; gap: 6px;
  }
  .verify-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; padding: 5px 8px; border-radius: 5px;
    background: var(--card2);
  }
  .verify-icon { font-size: 13px; flex-shrink: 0; }
  .verify-label { flex: 1; color: var(--text-dim); }
  .verify-value { font-family: var(--mono); font-size: 11px; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .meta-row { display: flex; gap: 20px; margin-bottom: 10px; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-item .ml { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .meta-item .mv { font-size: 13px; color: var(--text); font-family: var(--mono); }
  .meta-item .mv.green { color: var(--green); }
  .meta-item .mv.red { color: var(--red); }
  .meta-item .mv.yellow { color: var(--yellow); }

  /* SPINNER */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--teal-dim);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2A3D50; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 40px; color: var(--text-muted);
    font-size: 13px;
  }
  .empty-state .big { font-size: 32px; margin-bottom: 8px; }

  /* STATUS ICON helpers */
  .icon-pass::before { content: '✓'; color: var(--green); }
  .icon-fail::before { content: '✗'; color: var(--red); }
  .icon-mock::before { content: '⚠'; color: var(--yellow); }
  .icon-pending::before { content: '○'; color: var(--text-muted); }
  .icon-running { display: inline-block; }

  .tag-real { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--green-dim); color: var(--green); font-weight: 600; }
  .tag-mock { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--yellow-dim); color: var(--yellow); font-weight: 600; }
  .tag-cached { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--blue-dim); color: var(--blue); font-weight: 600; }

  .run-all-running { pointer-events: none; opacity: 0.7; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">Market<span>Coach</span> · Health</div>
  <div class="topbar-url">
    <label>Backend URL</label>
    <input type="text" id="baseUrl" value="http://localhost:8000" />
  </div>
  <div class="topbar-symbol">
    <label>Test Symbol</label>
    <input type="text" id="testSymbol" value="AAPL" />
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="resetAll()">Reset</button>
    <button class="btn btn-primary" id="runAllBtn" onclick="runAll()">▶ Run All Tests</button>
  </div>
</div>

<!-- SUMMARY STRIP -->
<div class="summary-strip">
  <div class="summary-cell">
    <span class="label">Passing</span>
    <span class="value green" id="statPass">—</span>
    <span class="sub" id="statPassSub">Not run yet</span>
  </div>
  <div class="summary-cell">
    <span class="label">Failing</span>
    <span class="value red" id="statFail">—</span>
    <span class="sub" id="statFailSub">Not run yet</span>
  </div>
  <div class="summary-cell">
    <span class="label">Mock / Degraded</span>
    <span class="value yellow" id="statMock">—</span>
    <span class="sub" id="statMockSub">Not run yet</span>
  </div>
  <div class="summary-cell">
    <span class="label">Avg Response</span>
    <span class="value teal" id="statAvg">—</span>
    <span class="sub" id="statAvgSub">ms per endpoint</span>
  </div>
  <div class="summary-cell">
    <span class="label">Total Tests</span>
    <span class="value" id="statTotal" style="color:var(--text)">—</span>
    <span class="sub" id="statProgress">Ready</span>
  </div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap">
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- CONTENT -->
  <div class="content" id="content"></div>
</div>

<script>
// ============================================================
// TEST DEFINITIONS
// ============================================================
const CATEGORIES = [
  {
    id: 'health', icon: '🩺', title: 'Core Health',
    tests: [
      { id: 'h1', name: 'Root health check', method: 'GET', path: () => '/', verify: (r) => verifyFields(r, []) },
      { id: 'h2', name: 'Health endpoint', method: 'GET', path: () => '/health', verify: (r) => verifyFields(r, ['status']) },
    ]
  },
  {
    id: 'market', icon: '📈', title: 'Market Data',
    tests: [
      { id: 'm1', name: 'Single quote', method: 'GET', path: (s) => `/api/market/quote/${s}`, verify: (r) => verifyFields(r, ['price','change','symbol']) },
      { id: 'm2', name: 'Batch quotes', method: 'GET', path: (s) => `/api/market/quotes?symbols=${s},MSFT,BTC`, verify: (r) => ({ pass: Array.isArray(r) || typeof r === 'object', checks: [{ label: 'Returns data', ok: Array.isArray(r) || typeof r === 'object', value: 'Array or object' }] }) },
      { id: 'm3', name: 'Candles (bars)', method: 'GET', path: (s) => `/api/market/candles/${s}?interval=1d&limit=100`, verify: (r) => ({ pass: Array.isArray(r?.candles || r) && (r?.candles || r).length > 0, checks: [{ label: 'Has candle array', ok: Array.isArray(r?.candles || r), value: `${(r?.candles || r || []).length} bars` }] }) },
      { id: 'm4', name: 'Price range', method: 'GET', path: (s) => `/api/market/range/${s}`, verify: (r) => verifyFields(r, ['day_high','day_low']) },
      { id: 'm5', name: 'Market indices', method: 'GET', path: () => `/api/market/indices`, verify: (r) => ({ pass: Array.isArray(r) && r.length > 0, checks: [{ label: 'Has indices', ok: Array.isArray(r) && r.length > 0, value: `${(r||[]).length} indices` }] }) },
      { id: 'm6', name: 'Sector heatmap', method: 'GET', path: () => `/api/market/heatmap`, verify: (r) => ({ pass: Array.isArray(r) && r.length > 0, checks: [{ label: 'Has sectors', ok: Array.isArray(r) && r.length > 0, value: `${(r||[]).length} sectors` }] }) },
      { id: 'm7', name: 'Fear & Greed index', method: 'GET', path: () => `/api/market/fear-greed`, verify: (r) => verifyFields(r, ['score','label']) },
      { id: 'm8', name: 'Technical alerts', method: 'GET', path: () => `/api/market/technical-alerts`, verify: (r) => ({ pass: Array.isArray(r) || typeof r === 'object', checks: [{ label: 'Returns data', ok: true, value: JSON.stringify(r).slice(0,40) }] }) },
      { id: 'm9', name: 'Economic calendar', method: 'GET', path: () => `/api/market/economic-calendar?days_ahead=7`, verify: (r) => ({ pass: Array.isArray(r) || typeof r === 'object', checks: [{ label: 'Returns data', ok: true, value: JSON.stringify(r).slice(0,50) }] }) },
    ]
  },
  {
    id: 'indicators', icon: '📊', title: 'Technical Indicators',
    tests: [
      { id: 'i1', name: 'Indicators (RSI, MACD, BB)', method: 'GET', path: (s) => `/api/indicators/${s}?period=100`, verify: (r) => verifyFields(r, ['rsi','macd']) },
      { id: 'i2', name: 'DCF Valuation', method: 'GET', path: (s) => `/api/indicators/valuation/dcf/${s}`, verify: (r) => verifyFields(r, ['intrinsic_value']), softFail404: true, softFail404Msg: 'yfinance freeCashflow unavailable for this symbol — DCF requires FCF data' },
      { id: 'i3', name: 'Valuation metrics', method: 'GET', path: (s) => `/api/indicators/valuation/metrics/${s}`, verify: (r) => verifyFields(r, ['pe_ratio']), softFail404: true, softFail404Msg: 'yfinance metrics unavailable for this symbol' },
    ]
  },
  {
    id: 'analysis', icon: '🤖', title: 'AI Analysis',
    tests: [
      { id: 'a1', name: 'AI analysis (POST)', method: 'POST', path: (s) => `/api/analyze/${s}`, body: (s) => ({ symbol: s }), verify: (r) => detectMockOrReal(r, ['symbol','analysis_text']), timeout: 60000 },
      { id: 'a2', name: 'Structured analysis', method: 'GET', path: (s) => `/api/structured/${s}`, verify: (r) => detectMockOrReal(r, ['symbol']) },
      { id: 'a3', name: 'Signal engine (5-layer)', method: 'GET', path: (s) => `/api/analyse/${s}`, verify: (r) => verifyFields(r, ['signals','prediction']), requiresAuth: true },
      { id: 'a4', name: 'Monte Carlo simulation', method: 'POST', path: () => `/api/analysis/monte-carlo`, body: (s) => ({ symbol: s, horizon_days: 30, num_simulations: 100 }), verify: (r) => verifyFields(r, ['percentiles','prob_profit']) },
      { id: 'a5', name: 'Bayesian price target', method: 'POST', path: () => `/api/bayesian-target`, body: (s) => ({ symbol: s, analyst_target: 220, analyst_confidence: 0.7, horizon_days: 30 }), verify: (r) => verifyFields(r, ['posterior_mean']) },
      { id: 'a6', name: 'Reddit sentiment', method: 'GET', path: (s) => `/api/reddit-sentiment/${s}`, verify: (r) => verifyFields(r, ['symbol']), notConfigured: true, notConfiguredMsg: 'REDDIT_CLIENT_ID is a placeholder in .env — add real PRAW credentials to enable' },
    ]
  },
  {
    id: 'news', icon: '📰', title: 'News & Sentiment',
    tests: [
      { id: 'n1', name: 'Ticker news', method: 'GET', path: (s) => `/api/news/ticker/${s}?limit=5`, verify: (r) => verifyFields(r, ['articles','sentiment_summary']) },
      { id: 'n2', name: 'Market news', method: 'GET', path: () => `/api/news/market?limit=5`, verify: (r) => verifyFields(r, ['articles']) },
    ]
  },
  {

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function verifyFields(r, fields) {
  if (!r || typeof r !== 'object') return { pass: false, checks: [{ label: 'Response is object', ok: false, value: typeof r }] };
  const checks = fields.map(f => ({ label: `Has field: ${f}`, ok: f in r, value: r[f] !== undefined ? JSON.stringify(r[f]).slice(0, 50) : 'missing' }));
  return { pass: checks.every(c => c.ok), checks };
}

function detectMockOrReal(r, fields) {
  const base = verifyFields(r, fields);
  const isMock = r?.is_mock === true || r?.mock === true || r?.source === 'mock';
  const isCached = r?.is_cached === true;
  return {
    ...base,
    isMock,
    isCached,
    checks: [
      ...base.checks,
      { label: 'Data source', ok: !isMock, value: isMock ? '⚠ MOCK' : isCached ? '🔵 CACHED' : '✅ REAL' }
    ]
  };
}

// Dev JWT for DEV_BYPASS_AUTH=true endpoints.
// header.{"sub":"dev_user","user_id":"dev_dashboard"}.sig — no real sig needed in dev mode.
const DEV_JWT = 'eyJhbGciOiJub25lIn0.eyJzdWIiOiJkZXZfdXNlciIsInVzZXJfaWQiOiJkZXZfZGFzaGJvYXJkIn0.dev_sig';

// State
const state = {};
let running = false;

function getBase() { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }
function getSymbol() { return document.getElementById('testSymbol').value.toUpperCase() || 'AAPL'; }

// ============================================================
// RUN TESTS
// ============================================================
async function runTest(id) {
  const test = CATEGORIES.flatMap(c => c.tests).find(t => t.id === id);
  if (!test) return;

  const base = getBase();
  const sym = getSymbol();
  const pathStr = test.path(sym);
  const url = base + pathStr;

  // Short-circuit: not configured (e.g. Reddit placeholder creds)
  if (test.notConfigured) {
    state[id] = { status: 'mock', elapsed: 0, data: null, verification: null, error: null, skipped: test.notConfiguredMsg };
    setSkipped(id, 'NOT CONFIGURED', test.notConfiguredMsg || 'Credentials not set', pathStr);
    updateStats();
    updateCategoryStatus();
    return;
  }

  setRunning(id, pathStr);

  const start = Date.now();
  let result;

  // Build headers — add dev Bearer token for auth-gated endpoints
  const authHeaders = test.requiresAuth
    ? { 'Authorization': `Bearer ${DEV_JWT}` }
    : {};

  const getTimeout = test.timeout || (test.method === 'GET' ? 20000 : 30000);

  try {
    if (test.streaming) {
      result = await fetchStreaming(url, test.method, test.body ? test.body(sym) : null, authHeaders, getTimeout);
    } else if (test.method === 'GET') {
      const res = await fetch(url, {
        headers: authHeaders,
        signal: AbortSignal.timeout(getTimeout)
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      // softFail404: treat 404 as "data unavailable" (yellow) instead of hard fail
      if (!res.ok) {
        if (res.status === 404 && test.softFail404) {
          state[id] = { status: 'mock', elapsed: Date.now() - start, data: null, verification: null, error: null, skipped: test.softFail404Msg || 'Data unavailable (404)' };
          setSkipped(id, 'NO DATA', test.softFail404Msg || 'Data unavailable', pathStr);
          updateStats(); updateCategoryStatus(); return;
        }
        throw new Error(`HTTP ${res.status}: ${text.slice(0, 300)}`);
      }
      result = { data, status: res.status };
    } else {
      const body = test.body ? test.body(sym) : {};
      const res = await fetch(url, {
        method: test.method,
        headers: { 'Content-Type': 'application/json', ...authHeaders },
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(getTimeout)
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${text.slice(0, 300)}`);
      result = { data, status: res.status };
    }

    const elapsed = Date.now() - start;
    const verification = test.verify(result.data);
    const finalStatus = verification.isMock ? 'mock' : verification.pass ? 'pass' : 'fail';

    state[id] = { status: finalStatus, elapsed, data: result.data, verification, error: null };
    setDone(id, finalStatus, elapsed, result.data, verification, null, pathStr);

  } catch (err) {
    const elapsed = Date.now() - start;
    // Jarvis / optional services: treat connection errors as "offline" not "fail"
    if (test.skipIfOffline && (err.message.includes('fetch') || err.message.includes('503') || err.message.includes('502') || err.message.includes('500'))) {
      state[id] = { status: 'mock', elapsed, data: null, verification: null, error: null, skipped: 'Service offline or not running' };
      setSkipped(id, 'OFFLINE', 'Service not running — start Jarvis to enable', pathStr);
    } else {
      state[id] = { status: 'fail', elapsed, data: null, verification: null, error: err.message };
      setDone(id, 'fail', elapsed, null, null, err.message, pathStr);
    }
  }

  updateStats();
  updateCategoryStatus();
}

async function fetchStreaming(url, method, body, extraHeaders = {}, timeout = 30000) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...extraHeaders },
    body: JSON.stringify(body),
    signal: AbortSignal.timeout(timeout)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let text = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    // Parse SSE chunks: data: {"text": "..."}
    const lines = chunk.split('\n');
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        try {
          const json = JSON.parse(line.slice(6));
          if (json.text) text += json.text;
        } catch {}
      }
    }
    if (text.length > 200) break; // enough to verify
  }
  return { data: text };
}

function setRunning(id, path) {
  const card = document.getElementById('card-' + id);
  const icon = document.getElementById('icon-' + id);
  const badge = document.getElementById('badge-' + id);
  const timeEl = document.getElementById('time-' + id);
  card.className = 'test-card running';
  icon.innerHTML = '<div class="spinner"></div>';
  badge.className = 'test-badge running';
  badge.textContent = 'RUNNING';
  timeEl.textContent = '';
  document.getElementById('detail-' + id).classList.remove('open');
  document.getElementById('detail-content-' + id).innerHTML = '';
}

function setDone(id, status, elapsed, data, verification, error, pathStr) {
  const card = document.getElementById('card-' + id);
  const icon = document.getElementById('icon-' + id);
  const badge = document.getElementById('badge-' + id);
  const timeEl = document.getElementById('time-' + id);

  card.className = `test-card ${status}`;
  badge.className = `test-badge ${status}`;

  const labels = { pass: 'PASS', fail: 'FAIL', mock: 'MOCK', pending: 'PENDING' };
  badge.textContent = labels[status] || status.toUpperCase();

  const icons = { pass: '<span class="icon-pass"></span>', fail: '<span class="icon-fail"></span>', mock: '<span class="icon-mock"></span>' };
  icon.innerHTML = icons[status] || '<span class="icon-pending"></span>';

  timeEl.textContent = elapsed + 'ms';

  // Build detail
  const detailContent = document.getElementById('detail-content-' + id);
  if (error) {
    detailContent.innerHTML = `
      <div class="meta-row" style="padding-top:10px">
        <div class="meta-item"><span class="ml">Status</span><span class="mv red">FAILED</span></div>
        <div class="meta-item"><span class="ml">Time</span><span class="mv">${elapsed}ms</span></div>
        <div class="meta-item"><span class="ml">URL</span><span class="mv">${getBase() + pathStr}</span></div>
      </div>
      <div class="error-block">${escHtml(error)}</div>`;
  } else {
    const isMock = verification?.isMock;
    const isCached = verification?.isCached;
    const dataTag = isMock ? '<span class="tag-mock">MOCK</span>' : isCached ? '<span class="tag-cached">CACHED</span>' : '<span class="tag-real">REAL</span>';

    detailContent.innerHTML = `
      <div class="detail-tabs">
        <div class="detail-tab active" onclick="switchTab(event,'${id}','verify')">Verification</div>
        <div class="detail-tab" onclick="switchTab(event,'${id}','response')">Response</div>
      </div>
      <div class="detail-pane active" id="pane-verify-${id}">
        <div class="meta-row">
          <div class="meta-item"><span class="ml">Status</span><span class="mv ${status}">${status.toUpperCase()}</span></div>
          <div class="meta-item"><span class="ml">Time</span><span class="mv">${elapsed}ms</span></div>
          <div class="meta-item"><span class="ml">Data Source</span>${dataTag}</div>
          <div class="meta-item"><span class="ml">URL</span><span class="mv" style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${getBase() + pathStr}</span></div>
        </div>
        <div class="verify-block">
          ${(verification?.checks || []).map(c => `
            <div class="verify-row">
              <span class="verify-icon">${c.ok ? '✅' : '❌'}</span>
              <span class="verify-label">${escHtml(c.label)}</span>
              <span class="verify-value">${escHtml(String(c.value || ''))}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="detail-pane" id="pane-response-${id}">
        <div class="response-block">${syntaxHighlight(data)}</div>
      </div>
    `;
    // Auto-open detail on fail
    if (status === 'fail' || status === 'mock') {
      document.getElementById('detail-' + id).classList.add('open');
    }
  }
}

function setSkipped(id, label, reason, pathStr) {
  const card = document.getElementById('card-' + id);
  const icon = document.getElementById('icon-' + id);
  const badge = document.getElementById('badge-' + id);
  const timeEl = document.getElementById('time-' + id);
  card.className = 'test-card mock';
  badge.className = 'test-badge mock';
  badge.textContent = label;
  icon.innerHTML = '<span class="icon-mock"></span>';
  timeEl.textContent = '—';
  const detailContent = document.getElementById('detail-content-' + id);
  detailContent.innerHTML = `
    <div class="meta-row" style="padding-top:10px">
      <div class="meta-item"><span class="ml">Status</span><span class="mv yellow">${label}</span></div>
      <div class="meta-item"><span class="ml">URL</span><span class="mv">${getBase() + pathStr}</span></div>
    </div>
    <div class="verify-block">
      <div class="verify-row"><span class="verify-icon">⚠️</span><span class="verify-label">${escHtml(reason)}</span></div>
    </div>`;
}

function switchTab(event, id, tab) {
  const tabs = event.target.parentElement.querySelectorAll('.detail-tab');
  tabs.forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`pane-verify-${id}`)?.classList.remove('active');
  document.getElementById(`pane-response-${id}`)?.classList.remove('active');
  const pane = document.getElementById(`pane-${tab}-${id}`);
  if (pane) pane.classList.add('active');
}

function syntaxHighlight(obj) {
  if (obj === null || obj === undefined) return 'null';
  let str;
  try {
    str = JSON.stringify(obj, null, 2);
  } catch { return String(obj); }
  // Limit
  if (str.length > 3000) str = str.slice(0, 3000) + '\n\n… (truncated)';
  return escHtml(str)
    .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span class="str">"$1"</span>')
    .replace(/: (-?\d+\.?\d*)/g, ': <span class="num">$1</span>')
    .replace(/: (true|false)/g, ': <span class="bool">$1</span>')
    .replace(/: null/g, ': <span class="null">null</span>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// RUN ALL / CATEGORY
// ============================================================
async function runAll() {
  if (running) return;
  running = true;
  const btn = document.getElementById('runAllBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';

  const allTests = CATEGORIES.flatMap(c => c.tests);
  for (let i = 0; i < allTests.length; i++) {
    document.getElementById('statProgress').textContent = `Running ${i + 1} / ${allTests.length}`;
    document.getElementById('progressFill').style.width = ((i / allTests.length) * 100) + '%';
    await runTest(allTests[i].id);
    await sleep(300); // 300ms between tests — reduces yfinance rate-limiting
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('statProgress').textContent = 'All tests complete';
  btn.disabled = false;
  btn.textContent = '▶ Run All Tests';
  running = false;
}

async function runCategory(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  for (const t of cat.tests) {
    await runTest(t.id);
    await sleep(60);
  }
}

function resetAll() {
  Object.keys(state).forEach(k => delete state[k]);
  buildUI();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
// STATS & SIDEBAR UPDATE
// ============================================================
function updateStats() {
  const all = CATEGORIES.flatMap(c => c.tests);
  const ran = all.filter(t => state[t.id]);
  const pass = ran.filter(t => state[t.id]?.status === 'pass').length;
  const fail = ran.filter(t => state[t.id]?.status === 'fail').length;
  const mock = ran.filter(t => state[t.id]?.status === 'mock' && !state[t.id]?.skipped).length;
  const skipped = ran.filter(t => state[t.id]?.skipped).length;
  const times = ran.map(t => state[t.id]?.elapsed).filter(Boolean);
  const avg = times.length ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : null;

  document.getElementById('statPass').textContent = ran.length ? pass : '—';
  document.getElementById('statFail').textContent = ran.length ? fail : '—';
  document.getElementById('statMock').textContent = ran.length ? mock : '—';
  document.getElementById('statAvg').textContent = avg !== null ? avg + 'ms' : '—';
  document.getElementById('statTotal').textContent = all.length;

  if (ran.length) {
    const testable = ran.length - skipped;
    document.getElementById('statPassSub').textContent = testable > 0 ? `${Math.round(pass/testable*100)}% pass rate` : '—';
    document.getElementById('statFailSub').textContent = fail > 0 ? `${fail} endpoints down` : 'All endpoints up';
    document.getElementById('statMockSub').textContent = mock > 0 ? `${mock} using mock data` : skipped > 0 ? `${skipped} skipped (offline/unconfigured)` : 'No mock fallbacks';
  }
}

function updateCategoryStatus() {
  CATEGORIES.forEach(cat => {
    const results = cat.tests.map(t => state[t.id]?.status);
    const hasFail = results.some(s => s === 'fail');
    const hasMock = results.some(s => s === 'mock');
    const allPass = results.length > 0 && results.every(s => s === 'pass');
    const anyRunning = results.some(s => s === undefined && document.getElementById('card-' + cat.tests.find(t => !state[t.id])?.id)?.classList.contains('running'));

    const dot = document.getElementById('dot-' + cat.id);
    const cnt = document.getElementById('cnt-' + cat.id);
    const pass = results.filter(s => s === 'pass').length;
    const fail = results.filter(s => s === 'fail').length;
    const ran = results.filter(Boolean).length;

    dot.className = 'dot';
    if (hasFail) dot.classList.add('red');
    else if (hasMock) dot.classList.add('yellow');
    else if (allPass) dot.classList.add('green');

    if (ran > 0) {
      cnt.textContent = `${pass}/${cat.tests.length} pass`;
    }
  });
}
